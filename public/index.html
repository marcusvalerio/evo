<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#F6F4F1" media="(prefers-color-scheme: light)"/>
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)"/>
<link rel="manifest" href="./manifest.json"/>
<title>EVO</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── LIGHT THEME (DEFAULT) ── */
:root{
  --bg:#F6F4F1;
  --bg2:#EDEAE5;
  --surface:rgba(255,255,255,0.85);
  --surface2:rgba(255,255,255,0.6);
  --surface-solid:#ffffff;
  --border:rgba(10,37,56,0.08);
  --border-hi:rgba(10,37,56,0.14);
  --navy:#0A2538;
  --navy-soft:#0d3452;
  --chalk:#EBE1C9;
  --coral:#F34723;
  --coral-dim:rgba(243,71,35,0.1);
  --coral-border:rgba(243,71,35,0.22);
  --surf:#AEC3C4;
  --ruby:#841B2D;
  --text:#0A2538;
  --text-2:#5a6a78;
  --text-3:#aec3c4;
  --shadow-xs:0 1px 4px rgba(10,37,56,0.06);
  --shadow-sm:0 2px 16px rgba(10,37,56,0.07);
  --shadow-md:0 8px 32px rgba(10,37,56,0.10);
  --shadow-lg:0 16px 56px rgba(10,37,56,0.13);
  --blur:blur(20px);
  --J:'Plus Jakarta Sans',system-ui,sans-serif;
  --M:'DM Mono',ui-monospace,monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.16,1,.3,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

/* ── DARK THEME ── */
@media(prefers-color-scheme:dark){
  :root{
    --bg:#080808;
    --bg2:#101010;
    --surface:rgba(22,22,26,0.85);
    --surface2:rgba(28,28,32,0.7);
    --surface-solid:#161616;
    --border:rgba(255,255,255,0.07);
    --border-hi:rgba(255,255,255,0.13);
    --navy-soft:#1a3f5c;
    --text:#f0ede8;
    --text-2:#7a8898;
    --text-3:#354555;
    --shadow-xs:0 1px 4px rgba(0,0,0,0.3);
    --shadow-sm:0 2px 16px rgba(0,0,0,0.35);
    --shadow-md:0 8px 32px rgba(0,0,0,0.45);
    --shadow-lg:0 16px 56px rgba(0,0,0,0.55);
    --coral:#ff5533;
    --coral-dim:rgba(255,85,51,0.12);
    --coral-border:rgba(255,85,51,0.25);
    --chalk:#1e2a35;
  }
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:var(--J);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overscroll-behavior:none;
  transition:background .3s, color .3s;
}
button,input,select,textarea{font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── AMBIENT BG (dark only) ── */
.ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
  opacity:0;transition:opacity .5s;
}
@media(prefers-color-scheme:dark){.ambient{opacity:1}}
.amb-blob{
  position:absolute;border-radius:50%;filter:blur(80px);
  animation:blobFloat ease-in-out infinite alternate;
}
.amb-1{width:500px;height:500px;top:-200px;left:-150px;background:radial-gradient(circle,rgba(243,71,35,.06),transparent 70%);animation-duration:12s}
.amb-2{width:400px;height:400px;bottom:-150px;right:-100px;background:radial-gradient(circle,rgba(10,37,56,.15),transparent 70%);animation-duration:15s;animation-delay:3s}
.amb-3{width:300px;height:300px;top:40%;left:30%;background:radial-gradient(circle,rgba(174,195,196,.04),transparent 70%);animation-duration:10s;animation-delay:6s}
@keyframes blobFloat{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,40px) scale(1.08)}}

/* ── SCREENS ── */
.screen{
  position:fixed;inset:0;z-index:10;
  max-width:430px;margin:0 auto;
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg);
}
.screen.hidden{display:none!important}

/* ════════════════════════════════
   SPLASH
════════════════════════════════ */
#splash{
  align-items:center;justify-content:center;gap:20px;
  background:var(--navy);
}
@media(prefers-color-scheme:dark){
  #splash{background:#080808}
}

.splash-logo-wrap{
  animation:splashIn .9s var(--spring) both;
}
.splash-wordmark{
  font-size:44px;font-weight:800;letter-spacing:-2px;
  color:#fff;
  animation:splashIn .9s var(--ease) .18s both;
  display:flex;align-items:center;gap:10px;
}
.splash-tagline{
  font-family:var(--M);font-size:11px;letter-spacing:3px;
  color:rgba(255,255,255,.3);text-transform:uppercase;
  animation:splashIn .9s var(--ease) .32s both;
}
@keyframes splashIn{
  from{opacity:0;transform:translateY(20px) scale(.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
#splash.out{animation:splashOut .45s var(--ease) forwards}
@keyframes splashOut{
  from{opacity:1;transform:scale(1)}
  to{opacity:0;transform:scale(1.04)}
}

/* ════════════════════════════════
   AUTH WELCOME
════════════════════════════════ */
#auth-welcome{
  background:var(--navy);
  align-items:center;justify-content:space-between;
  padding:calc(var(--safe-top)+48px) 32px calc(var(--safe-bottom)+44px);
}
@media(prefers-color-scheme:dark){
  #auth-welcome{background:#080808}
}
.aw-hero{
  display:flex;flex-direction:column;align-items:center;
  gap:28px;flex:1;justify-content:center;
}
.aw-logo-ring{
  width:100px;height:100px;border-radius:32px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 40px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.08);
  animation:fadeUp .8s var(--ease) both;
}
.aw-titles{text-align:center;animation:fadeUp .8s var(--ease) .12s both}
.aw-headline{
  font-size:30px;font-weight:800;letter-spacing:-.8px;
  color:#fff;line-height:1.2;margin-bottom:10px;
}
.aw-headline span{color:var(--coral)}
.aw-sub{
  font-size:15px;color:rgba(255,255,255,.45);
  line-height:1.6;letter-spacing:-.1px;
}
.aw-sub strong{color:rgba(255,255,255,.75);font-weight:600}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
.aw-actions{
  width:100%;display:flex;flex-direction:column;gap:10px;
  animation:fadeUp .8s var(--ease) .26s both;
}
.btn-primary-full{
  width:100%;padding:16px;border-radius:16px;
  background:var(--coral);border:none;
  color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s var(--spring);
  box-shadow:0 4px 20px rgba(243,71,35,.35);
  position:relative;overflow:hidden;
}
.btn-primary-full::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);
  pointer-events:none;
}
.btn-primary-full:active{transform:scale(.97)}
.btn-ghost-full{
  width:100%;padding:15px;border-radius:16px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.8);font-size:15px;font-weight:600;
  cursor:pointer;transition:all .2s;
  backdrop-filter:var(--blur);
}
.btn-ghost-full:active{background:rgba(255,255,255,.18);transform:scale(.97)}
.btn-link-full{
  background:none;border:none;
  font-size:14px;color:rgba(255,255,255,.4);
  cursor:pointer;padding:8px;text-align:center;width:100%;
  transition:color .2s;
}
.btn-link-full:active{color:rgba(255,255,255,.7)}

/* ════════════════════════════════
   PIN SCREEN
════════════════════════════════ */
#pin-screen{
  background:var(--navy);
  align-items:center;justify-content:center;
  padding:calc(var(--safe-top)+24px) 32px calc(var(--safe-bottom)+32px);
  gap:0;
}
@media(prefers-color-scheme:dark){
  #pin-screen{background:#080808}
}
.pin-logo{
  margin-bottom:32px;
  animation:fadeUp .7s var(--ease) both;
}
.pin-title{
  font-size:22px;font-weight:800;letter-spacing:-.5px;
  color:#fff;text-align:center;margin-bottom:8px;
  animation:fadeUp .7s var(--ease) .08s both;
}
.pin-sub{
  font-size:14px;color:rgba(255,255,255,.4);
  text-align:center;margin-bottom:40px;
  animation:fadeUp .7s var(--ease) .14s both;
}
.pin-dots{
  display:flex;gap:16px;margin-bottom:48px;
  animation:fadeUp .7s var(--ease) .18s both;
}
.pin-dot{
  width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  background:transparent;
  transition:all .2s var(--spring);
}
.pin-dot.filled{
  background:var(--coral);border-color:var(--coral);
  transform:scale(1.1);
  box-shadow:0 0 12px rgba(243,71,35,.5);
}
.pin-dot.error{
  background:var(--ruby);border-color:var(--ruby);
  animation:pinShake .35s var(--spring);
}
@keyframes pinShake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(4px)}
  100%{transform:translateX(0)}
}
.pin-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;width:100%;max-width:280px;
  animation:fadeUp .7s var(--ease) .22s both;
}
.pin-key{
  aspect-ratio:1;border-radius:18px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;font-size:24px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s var(--spring);
  backdrop-filter:var(--blur);
}
.pin-key:active{background:rgba(255,255,255,.18);transform:scale(.92)}
.pin-key.del{font-size:18px;color:rgba(255,255,255,.5)}
.pin-key.del:active{background:rgba(243,71,35,.15);color:var(--coral)}
.pin-key.empty{pointer-events:none;background:transparent;border-color:transparent}
.pin-err-msg{
  font-family:var(--M);font-size:11px;letter-spacing:1px;
  color:rgba(255,255,255,.3);text-align:center;
  margin-top:24px;min-height:20px;
  animation:fadeUp .7s var(--ease) .26s both;
}

/* ════════════════════════════════
   PIN SETUP
════════════════════════════════ */
#pin-setup-screen{
  background:var(--navy);
  align-items:center;justify-content:center;
  padding:calc(var(--safe-top)+24px) 32px calc(var(--safe-bottom)+32px);
}
@media(prefers-color-scheme:dark){
  #pin-setup-screen{background:#080808}
}

/* ════════════════════════════════
   ONBOARDING
════════════════════════════════ */
#ob-screen{background:var(--bg)}
.ob-progress{
  display:flex;gap:6px;
  padding:calc(var(--safe-top)+16px) 24px 0;
  flex-shrink:0;
}
.ob-step{
  flex:1;height:3px;border-radius:2px;
  background:var(--border);overflow:hidden;
}
.ob-step-fill{
  height:100%;background:var(--coral);
  border-radius:2px;transition:width .4s var(--ease);
}
.ob-pages{flex:1;display:flex;overflow:hidden;position:relative}
.ob-page{
  position:absolute;inset:0;
  padding:28px 24px 0;
  display:flex;flex-direction:column;
  overflow-y:auto;
  transition:transform .4s var(--ease),opacity .4s var(--ease);
}
.ob-page::-webkit-scrollbar{display:none}
.ob-page.active{transform:translateX(0);opacity:1}
.ob-page.left{transform:translateX(-100%);opacity:0;pointer-events:none}
.ob-page.right{transform:translateX(100%);opacity:0;pointer-events:none}

.ob-icon{
  width:56px;height:56px;border-radius:18px;
  background:var(--coral-dim);border:1.5px solid var(--coral-border);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
}
.ob-icon svg{width:26px;height:26px;stroke:var(--coral);stroke-width:1.8;fill:none}
.ob-step-label{
  font-family:var(--M);font-size:10px;font-weight:500;
  letter-spacing:2.5px;color:var(--coral);
  text-transform:uppercase;margin-bottom:8px;
}
.ob-title{
  font-size:26px;font-weight:800;letter-spacing:-.7px;
  color:var(--text);line-height:1.15;margin-bottom:8px;
}
.ob-sub{
  font-size:14px;color:var(--text-2);
  line-height:1.65;margin-bottom:26px;
}
.ob-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.ob-label{
  font-family:var(--M);font-size:9px;font-weight:500;
  letter-spacing:2px;color:var(--text-2);text-transform:uppercase;
}
.ob-input{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;padding:13px 16px;
  color:var(--text);font-size:15px;
  outline:none;width:100%;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:var(--shadow-xs);
  backdrop-filter:var(--blur);
  -webkit-appearance:none;
}
.ob-input:focus{border-color:var(--coral);box-shadow:0 0 0 3px var(--coral-dim)}
.ob-input::placeholder{color:var(--text-3)}
.ob-row{display:flex;gap:10px}
.ob-row .ob-field{flex:1}

.ob-opts{display:flex;flex-direction:column;gap:10px}
.ob-opt{
  display:flex;align-items:center;gap:14px;
  padding:15px 18px;
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:18px;cursor:pointer;
  transition:all .2s var(--spring);
  box-shadow:var(--shadow-xs);
  backdrop-filter:var(--blur);
}
.ob-opt:active{transform:scale(.98)}
.ob-opt.sel{
  border-color:var(--coral);
  background:var(--coral-dim);
  box-shadow:0 0 0 3px var(--coral-dim);
}
.ob-opt-emoji{
  width:40px;height:40px;border-radius:12px;
  background:var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:20px;
  transition:background .2s;
}
.ob-opt.sel .ob-opt-emoji{background:var(--coral-border)}
.ob-opt-label{font-size:14px;font-weight:700;color:var(--text)}
.ob-opt-sub{font-size:12px;color:var(--text-2);margin-top:2px}
.ob-opt.sel .ob-opt-label{color:var(--coral)}
.ob-check{
  width:22px;height:22px;border-radius:7px;
  border:2px solid var(--border-hi);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  margin-left:auto;flex-shrink:0;
  transition:all .2s var(--spring);
}
.ob-opt.sel .ob-check{background:var(--coral);border-color:var(--coral)}
.ob-check svg{display:none;width:11px;height:9px}
.ob-opt.sel .ob-check svg{display:block}

.ob-footer{
  padding:14px 24px calc(var(--safe-bottom)+22px);
  display:flex;gap:10px;flex-shrink:0;
}
.ob-btn-back{
  padding:13px 20px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  font-size:14px;font-weight:700;color:var(--text-2);
  cursor:pointer;transition:all .2s var(--spring);flex-shrink:0;
  backdrop-filter:var(--blur);
}
.ob-btn-back:active{transform:scale(.94);background:var(--border)}
.ob-btn-next{
  flex:1;padding:13px;
  background:var(--coral);border:none;
  border-radius:14px;
  font-family:var(--J);font-size:15px;font-weight:700;
  color:#fff;cursor:pointer;
  transition:all .2s var(--spring);
  box-shadow:0 4px 18px rgba(243,71,35,.3);
  position:relative;overflow:hidden;
}
.ob-btn-next::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);pointer-events:none}
.ob-btn-next:active{transform:scale(.97)}
.ob-btn-next:disabled{opacity:.45;pointer-events:none}

/* ════════════════════════════════
   GENERATING
════════════════════════════════ */
#gen-screen{
  align-items:center;justify-content:center;
  gap:24px;text-align:center;padding:48px 32px;
  background:var(--bg);
}
.gen-orb{
  width:88px;height:88px;border-radius:28px;
  background:var(--coral-dim);
  border:2px solid var(--coral-border);
  display:flex;align-items:center;justify-content:center;
  animation:genPulse 1.8s ease-in-out infinite;
}
.gen-orb svg{width:40px;height:40px;stroke:var(--coral);stroke-width:1.6;fill:none}
@keyframes genPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 var(--coral-dim)}
  50%{transform:scale(1.06);box-shadow:0 0 0 18px transparent}
}
.gen-title{font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--text)}
.gen-sub{font-size:14px;color:var(--text-2);line-height:1.55;max-width:260px}
.gen-steps{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px}
.gen-step{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:var(--shadow-xs);
  backdrop-filter:var(--blur);
}
.g-dot{width:8px;height:8px;border-radius:50%;background:var(--border-hi);flex-shrink:0;transition:background .3s}
.g-dot.done{background:#10b981}
.g-dot.active{background:var(--coral);animation:dotBlink .8s ease-in-out infinite}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:.25}}
.g-txt{font-size:13px;color:var(--text-2)}
.g-txt.done{color:var(--text);font-weight:500}
.g-txt.active{color:var(--text);font-weight:600}

/* ════════════════════════════════
   APP SHELL
════════════════════════════════ */
#app-screen{
  display:none;
  max-width:430px;margin:0 auto;
  min-height:100vh;
  position:relative;
  background:var(--bg);
}

/* ── TAB BAR ── */
#tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--surface);
  border-top:1px solid var(--border);
  backdrop-filter:saturate(200%) var(--blur);
  -webkit-backdrop-filter:saturate(200%) var(--blur);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 0 calc(var(--safe-bottom)+6px);
  z-index:100;
  box-shadow:0 -4px 30px rgba(10,37,56,.06);
}
.ti{
  flex:1;height:52px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  border:none;background:transparent;cursor:pointer;
  transition:transform .17s var(--spring);
}
.ti:active{transform:scale(.82)}
.ti-icon{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border-radius:9px;
  transition:background .2s,transform .22s var(--spring);
}
.ti.active .ti-icon{background:var(--coral-dim);transform:scale(1.1)}
.ti svg{
  width:20px;height:20px;
  stroke:var(--text-3);stroke-width:1.8;fill:none;
  transition:stroke .2s;
}
.ti.active svg{stroke:var(--coral)}
.ti-lbl{
  font-family:var(--M);font-size:9.5px;font-weight:500;
  color:var(--text-3);transition:color .2s;
}
.ti.active .ti-lbl{color:var(--coral)}

/* ── SCROLL ── */
.scroll{
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-top:calc(var(--safe-top)+16px);
  padding-bottom:calc(68px + var(--safe-bottom) + 20px);
}
.scroll::-webkit-scrollbar{display:none}
.page{animation:pgIn .28s var(--ease) both}
@keyframes pgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.sg>*{opacity:0;animation:sgUp .32s var(--ease) both}
.sg>*:nth-child(1){animation-delay:.04s}.sg>*:nth-child(2){animation-delay:.09s}
.sg>*:nth-child(3){animation-delay:.13s}.sg>*:nth-child(4){animation-delay:.17s}
.sg>*:nth-child(5){animation-delay:.21s}.sg>*:nth-child(6){animation-delay:.25s}
@keyframes sgUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE HEADER ── */
.ph{padding:0 20px 22px}
.ph-eye{
  font-family:var(--M);font-size:10px;font-weight:400;
  letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:5px;
}
.ph-title{
  font-size:30px;font-weight:800;letter-spacing:-.9px;
  line-height:1.05;color:var(--text);
}
.ph-title em{color:var(--coral);font-style:normal}

/* ── CARDS ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:22px;overflow:hidden;
  margin-bottom:10px;
  box-shadow:var(--shadow-sm);
  backdrop-filter:var(--blur);
}
.card.done{border-color:rgba(16,185,129,.22);background:rgba(16,185,129,.04)}
.card-hdr{
  padding:14px 18px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card.done .card-hdr{border-bottom-color:rgba(16,185,129,.12)}
.card-ico{
  width:28px;height:28px;border-radius:8px;
  background:var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-ico svg{width:13px;height:13px;stroke:var(--text-2);stroke-width:1.8;fill:none}
.card.done .card-ico{background:rgba(16,185,129,.14)}
.card.done .card-ico svg{stroke:#10b981}
.card-name{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--text-2)}
.card.done .card-name{color:#10b981}
.card-ct{font-family:var(--M);font-size:11px;color:var(--text-3)}
.card.done .card-ct{color:#10b981}

/* ── ROWS ── */
.row{
  display:flex;align-items:center;gap:12px;
  padding:11px 18px;cursor:pointer;
  transition:background .1s;user-select:none;
}
.row:active{background:var(--border)}
.chkbox{
  width:22px;height:22px;flex-shrink:0;
  border-radius:7px;border:2px solid var(--border-hi);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--spring);
}
.chkbox.on{
  background:var(--coral);border-color:var(--coral);
  transform:scale(1.06);
  box-shadow:0 0 0 3px var(--coral-dim);
}
.chkbox.blue{border-color:rgba(59,130,246,.45)}
.chkbox svg{display:none;width:10px;height:8px}
.chkbox.on svg{display:block}
.rname{flex:1;font-size:13.5px;font-weight:500;color:var(--text);transition:all .2s}
.row.chk .rname{color:var(--text-3);text-decoration:line-through;opacity:.5}
.rname.cr{color:#3b82f6;font-style:italic}
.rqty{font-family:var(--M);font-size:10px;color:var(--text-3);flex-shrink:0}
.row.chk .rqty{opacity:.3}

/* ── RING ── */
.ring{position:relative;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:3}
.ring-fill{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease),stroke .4s}
.ring-txt{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--M);font-size:10px;font-weight:700;
}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 20px}
.sc{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;padding:15px 17px;
  box-shadow:var(--shadow-sm);
  backdrop-filter:var(--blur);
}
.sc.full{grid-column:1/-1}
.sc.navy{background:var(--navy);border-color:transparent}
.sc.hi{border-color:var(--coral-border);background:var(--coral-dim)}
.sc-lbl{
  font-family:var(--M);font-size:9px;letter-spacing:2.5px;
  color:var(--text-3);text-transform:uppercase;margin-bottom:8px;
}
.sc.navy .sc-lbl{color:rgba(255,255,255,.35)}
.sc-val{
  font-size:24px;font-weight:800;color:var(--text);
  line-height:1;letter-spacing:-.6px;
  font-variant-numeric:tabular-nums;
}
.sc-val.coral{color:var(--coral)}
.sc-val.sm{font-size:18px}
.sc.navy .sc-val{color:#fff}
.sc-sub{font-size:11px;color:var(--text-3);margin-top:4px;font-weight:500}
.sc.navy .sc-sub{color:rgba(255,255,255,.3)}

/* ── PBAR ── */
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:12px}
.pbar-fill{height:100%;border-radius:2px;transition:width 1.2s var(--ease);background:var(--coral)}

/* ── DAY PICKER ── */
.daypick{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;padding:0 20px;margin-bottom:14px;
}
.db{
  padding:8px 2px;border-radius:12px;
  background:var(--surface);border:2px solid var(--border);
  cursor:pointer;text-align:center;
  transition:all .2s var(--spring);
  box-shadow:var(--shadow-xs);
}
.db:active{transform:scale(.88)}
.db.sel{border-color:var(--coral);background:var(--coral-dim);box-shadow:0 0 0 3px var(--coral-dim)}
.db-name{font-family:var(--M);font-size:7.5px;letter-spacing:.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:3px}
.db.sel .db-name{color:var(--coral)}
.db-dot{width:3px;height:3px;border-radius:50%;background:var(--coral);margin:0 auto 3px}
.db-p{font-family:var(--M);font-size:8px;font-weight:600;color:var(--text-3)}
.db-p.done{color:#10b981}.db-p.part{color:var(--coral)}

/* ── DONE BANNER ── */
.done-banner{
  border-radius:22px;
  border:2px solid rgba(16,185,129,.22);
  background:rgba(16,185,129,.06);
  padding:26px 22px;text-align:center;margin-top:6px;
  animation:bIn .45s var(--spring) both;
}
@keyframes bIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.done-title{font-size:17px;font-weight:800;color:#059669;letter-spacing:-.3px;margin-bottom:4px}
.done-sub{font-family:var(--M);font-size:10px;letter-spacing:2.5px;color:#10b981;opacity:.5;text-transform:uppercase}

/* ── CONFETTI ── */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:600;overflow:hidden}
.cp{position:absolute;border-radius:2px;opacity:0;animation:cpFall linear forwards}
@keyframes cpFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}85%{opacity:.8}100%{opacity:0;transform:translateY(105vh) rotate(720deg)}}

/* ── CHART ── */
.chart-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:16px;overflow:hidden;
  box-shadow:var(--shadow-sm);backdrop-filter:var(--blur);
}
.chart-box svg{width:100%;display:block}
.no-data{font-family:var(--M);font-size:11px;color:var(--text-3);text-align:center;padding:28px 0}

/* ── WEIGHT LOG ── */
.wrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.wrow:last-child{border-bottom:none}
.wrow-date{font-family:var(--M);font-size:11px;color:var(--text-2);font-weight:500}
.wrow-r{display:flex;align-items:center;gap:10px}
.wrow-val{font-size:14px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.wrow-diff{font-family:var(--M);font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.wrow-del{background:none;border:none;color:var(--text-3);font-size:18px;cursor:pointer;padding:2px 4px;transition:color .15s}
.wrow-del:active{color:var(--ruby)}

/* ── TREINO ── */
.treino-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;overflow:hidden;margin-bottom:10px;
  box-shadow:var(--shadow-sm);backdrop-filter:var(--blur);
}
.treino-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.treino-tipo{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.treino-meta{font-family:var(--M);font-size:11px;color:var(--text-3);margin-top:2px}
.treino-date{font-family:var(--M);font-size:11px;color:var(--text-3)}
.treino-qual{display:inline-flex;align-items:center;font-family:var(--M);font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:4px}
.treino-qual.bom{color:#059669;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2)}
.treino-qual.ruim{color:var(--coral);background:var(--coral-dim);border:1px solid var(--coral-border)}
.treino-notas{padding:9px 18px 12px;font-size:12px;color:var(--text-2);font-style:italic;border-top:1px solid var(--border);line-height:1.5}

/* ── FORMS ── */
.form-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;overflow:hidden;margin-bottom:10px;
  box-shadow:var(--shadow-sm);backdrop-filter:var(--blur);
}
.form-hdr{
  padding:14px 18px;border-bottom:1px solid var(--border);
  font-size:14px;font-weight:800;color:var(--text);
  display:flex;align-items:center;justify-content:space-between;
}
.form-body{padding:16px 18px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field-r{display:flex;gap:8px}.field-r .field{flex:1;margin-bottom:0}
.flabel{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:2px;color:var(--text-2);text-transform:uppercase}
.finput{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:12px;padding:11px 14px;color:var(--text);
  font-size:14px;font-family:var(--J);outline:none;width:100%;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.finput:focus{border-color:var(--coral);box-shadow:0 0 0 3px var(--coral-dim)}
.finput::placeholder{color:var(--text-3)}
select.finput option{background:var(--surface-solid)}
.fbtn{
  width:100%;padding:13px;border-radius:13px;
  background:var(--coral);border:none;color:#fff;
  font-family:var(--J);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s var(--spring);margin-top:5px;
  box-shadow:0 4px 14px rgba(243,71,35,.28);
}
.fbtn:active{transform:scale(.97)}
.qual-row{display:flex;gap:8px;margin-bottom:12px}
.qual-opt{
  flex:1;padding:11px 8px;border-radius:13px;
  border:2px solid var(--border);background:var(--bg2);
  font-size:13px;font-weight:700;color:var(--text-2);
  cursor:pointer;text-align:center;transition:all .2s var(--spring);
}
.qual-opt:active{transform:scale(.93)}
.qual-opt.bom-sel{border-color:#10b981;background:rgba(16,185,129,.08);color:#059669}
.qual-opt.ruim-sel{border-color:var(--coral);background:var(--coral-dim);color:var(--coral)}

/* ── SHOP ── */
.shop-sum{
  margin:0 20px 12px;padding:14px 18px;
  border-radius:18px;background:var(--surface);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-sm);backdrop-filter:var(--blur);
}
.shop-label{font-family:var(--M);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:3px}
.shop-ct{font-size:14px;font-weight:700;color:var(--text)}
.clr{
  font-size:11px;font-weight:600;color:var(--text-2);
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:9px;padding:6px 12px;cursor:pointer;transition:all .18s;
}
.clr:active{background:var(--border);transform:scale(.92)}
.shop-info{flex:1}
.shop-irow{display:flex;align-items:center;justify-content:space-between}
.sname{font-size:13.5px;font-weight:500;color:var(--text)}
.row.chk .sname{color:var(--text-3);text-decoration:line-through;opacity:.5}
.sqty{font-family:var(--M);font-size:10px;color:var(--text-3);flex-shrink:0;margin-left:5px}
.stip{font-family:var(--M);font-size:10px;color:var(--text-3);margin-top:2px}
.row.chk .sqty,.row.chk .stip{opacity:.28}

/* ── FIN ── */
.cal-wrap{padding:0 20px;margin-bottom:14px}
.cal-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-month{font-size:15px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.cal-nav{display:flex;gap:5px}
.cal-nav button{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:9px;color:var(--text-2);font-size:14px;
  padding:4px 11px;cursor:pointer;
  box-shadow:var(--shadow-xs);transition:all .15s;
}
.cal-nav button:active{transform:scale(.88)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-family:var(--M);font-size:8px;font-weight:500;letter-spacing:.5px;color:var(--text-3);text-align:center;padding-bottom:5px;text-transform:uppercase}
.cd{
  aspect-ratio:1;border-radius:10px;
  border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  transition:all .17s var(--spring);
  box-shadow:var(--shadow-xs);
}
.cd:active{transform:scale(.84)}
.cd.today{border-color:rgba(243,71,35,.4)}
.cd.hasp{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.06)}
.cd.sel{border-color:var(--coral);background:var(--coral-dim);box-shadow:0 0 0 2px var(--coral-dim)}
.cd.empty{cursor:default;border-color:transparent;background:transparent;box-shadow:none}
.cd-num{font-family:var(--M);font-size:10px;font-weight:600;color:var(--text-2);line-height:1}
.cd.today .cd-num{color:var(--coral)}
.cd.hasp .cd-num,.cd.sel .cd-num{color:var(--text)}
.cd-dot{width:3px;height:3px;border-radius:50%;background:var(--coral)}
.pi{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.pi:last-child{border-bottom:none}
.pi-l{flex:1}
.pi-name{font-size:13px;font-weight:600;color:var(--text)}
.pi-cat{font-family:var(--M);font-size:10px;color:var(--text-3);margin-top:2px}
.pi-val{font-size:13px;font-weight:700;color:var(--coral);flex-shrink:0;margin-left:8px;font-variant-numeric:tabular-nums}
.pi-del{background:none;border:none;color:var(--text-3);font-size:17px;cursor:pointer;padding:2px 4px;transition:color .15s}
.pi-del:active{color:var(--ruby)}
.cbar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cbar-name{font-family:var(--M);font-size:9px;font-weight:500;color:var(--text-2);width:70px;flex-shrink:0;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbar-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.cbar-fill{height:100%;border-radius:2px;transition:width .9s var(--ease);background:var(--coral)}
.cbar-val{font-family:var(--M);font-size:9px;color:var(--text-2);width:56px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.hist-wk{font-family:var(--M);font-size:11px;font-weight:500;color:var(--text-2)}
.hist-val{font-size:12px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}

/* ── RECEITAS ── */
.rec-filters{display:flex;gap:6px;padding:0 20px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.rec-filters::-webkit-scrollbar{display:none}
.rf{
  flex-shrink:0;padding:7px 14px;border-radius:20px;
  border:2px solid var(--border);background:var(--surface);
  font-size:11px;font-weight:700;color:var(--text-2);
  cursor:pointer;transition:all .2s var(--spring);white-space:nowrap;
  box-shadow:var(--shadow-xs);backdrop-filter:var(--blur);
}
.rf:active{transform:scale(.9)}
.rf.on{border-color:var(--coral);color:var(--coral);background:var(--coral-dim)}
.rec-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;overflow:hidden;margin-bottom:10px;
  box-shadow:var(--shadow-sm);backdrop-filter:var(--blur);
}
.rec-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.rec-name{font-size:14px;font-weight:800;color:var(--text);flex:1;letter-spacing:-.2px}
.rec-badges{display:flex;gap:5px;flex-shrink:0}
.badge{font-family:var(--M);font-size:9px;font-weight:600;padding:3px 8px;border-radius:6px}
.badge-frz{color:#3b82f6;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.18)}
.badge-cat{color:var(--text-3);background:var(--border);border:1px solid var(--border-hi)}
.rec-body{padding:12px 18px 14px}
.rec-sec{font-family:var(--M);font-size:8.5px;font-weight:600;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:6px;margin-top:12px}
.rec-sec:first-child{margin-top:0}
.rec-ingr{font-size:13px;color:var(--text-2);line-height:1.9}
.rec-step{display:flex;gap:9px;margin-bottom:7px;font-size:13px;color:var(--text);line-height:1.5}
.step-n{font-family:var(--M);font-size:10px;font-weight:700;color:var(--coral);flex-shrink:0;margin-top:2px;width:14px}
.rec-tip{margin-top:10px;padding:10px 12px;background:var(--coral-dim);border-left:2px solid var(--coral-border);border-radius:0 9px 9px 0;font-size:12px;color:var(--text-2);font-style:italic;line-height:1.6}
.rec-exp{width:100%;padding:11px;background:transparent;border:none;border-top:1px solid var(--border);font-family:var(--M);font-size:9.5px;font-weight:600;letter-spacing:.8px;color:var(--text-3);cursor:pointer;transition:background .17s;text-transform:uppercase}
.rec-exp:active{background:var(--border)}

/* ── MAIS ── */
.mais-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:22px;padding:16px 18px;margin-bottom:10px;
  display:flex;align-items:center;gap:15px;cursor:pointer;
  box-shadow:var(--shadow-sm);backdrop-filter:var(--blur);
  transition:all .18s var(--spring);
}
.mais-item:active{transform:scale(.98)}
.mais-ico{
  width:42px;height:42px;border-radius:13px;background:var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.mais-ico svg{width:18px;height:18px;stroke:var(--text-2);stroke-width:1.7;fill:none}
.mais-label{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.2px}
.mais-sub{font-family:var(--M);font-size:10px;color:var(--text-3);margin-top:3px}
.mais-arr{margin-left:auto;color:var(--text-3)}

/* ── PREP ── */
.prep-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.prep-hdr{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.prep-name{font-size:14px;font-weight:700;color:var(--text)}
.prep-badge{font-family:var(--M);font-size:9px;font-weight:600;padding:3px 9px;border-radius:6px;border:1px solid}
.prep-badge.on{color:#059669;border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.08)}
.prep-badge.off{color:var(--text-3);border-color:var(--border)}
.prep-row{padding:10px 18px 12px;display:flex;align-items:center;justify-content:space-between;font-family:var(--M);font-size:10px;color:var(--text-2)}
.prep-ctrl{display:flex;align-items:center;gap:12px}
.prep-num{font-size:17px;font-weight:800;color:var(--text);min-width:22px;text-align:center;font-variant-numeric:tabular-nums}
.prep-btn{width:30px;height:30px;border-radius:9px;border:2px solid var(--border);background:var(--bg2);color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .17s var(--spring);line-height:1}
.prep-btn:active{transform:scale(.84)}

/* ── WEEK GRID ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:0 20px;margin-bottom:8px}
.wgd{border-radius:12px;border:1.5px solid var(--border);padding:9px 3px;text-align:center;background:var(--surface);box-shadow:var(--shadow-xs)}
.wgd.d{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.06)}
.wgd.p{border-color:var(--coral-border);background:var(--coral-dim)}
.wgd.t{border-color:rgba(59,130,246,.2);background:rgba(59,130,246,.05)}
.wgd.dt{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.08)}
.wgd-name{font-family:var(--M);font-size:7.5px;font-weight:600;letter-spacing:.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:4px}
.wgd.d .wgd-name,.wgd.dt .wgd-name{color:#10b981}
.wgd-dots{display:flex;justify-content:center;gap:2px}
.dot{width:4px;height:4px;border-radius:50%}

/* ── INSIGHT ── */
.insight{
  margin:0 20px 12px;padding:18px 20px;
  border-radius:18px;background:var(--navy);
  box-shadow:var(--shadow-md);
}
@media(prefers-color-scheme:dark){
  .insight{background:#0f1e2a}
}
.ins-label{font-family:var(--M);font-size:9px;font-weight:500;letter-spacing:2.5px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:6px}
.ins-text{font-size:14px;color:rgba(255,255,255,.72);line-height:1.6}
.ins-text strong{color:#fff;font-weight:700}

/* ── IA BANNER ── */
.ia-banner{
  margin:0 20px 12px;padding:16px 18px;
  border-radius:18px;
  background:var(--surface);border:1.5px solid var(--coral-border);
  box-shadow:var(--shadow-sm);cursor:pointer;
  transition:all .2s var(--spring);
  backdrop-filter:var(--blur);
}
.ia-banner:active{transform:scale(.98)}
.ia-banner-top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.ia-ico{
  width:32px;height:32px;border-radius:10px;
  background:var(--coral-dim);border:1px solid var(--coral-border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ia-ico svg{width:16px;height:16px;stroke:var(--coral);stroke-width:1.8;fill:none}
.ia-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.15px}
.ia-sub{font-size:12px;color:var(--text-2);line-height:1.5}

/* ── UTILS ── */
.pad{padding:0 20px}
.sp8{height:8px}.sp12{height:12px}.sp16{height:16px}.sp24{height:24px}
</style>
