<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVO - High Performance Nutrition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0A0A0A;
            --surface-light: #141414;
            --accent: #CCFF00; /* Cyber Lime */
            --text: #ffffff;
            --text-dim: #666666;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

        /* --- LAYOUT E PÁGINAS --- */
        .app-shell { width: 100%; max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 100px; }
        .page { display: none; padding: 24px; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- TIPOGRAFIA --- */
        .logo { font-weight: 800; font-size: 2.2rem; letter-spacing: -2px; color: var(--accent); margin-bottom: 4px; }
        .slogan { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 40px; }
        h1 { font-size: 1.8rem; font-weight: 800; line-height: 1.1; margin-bottom: 24px; letter-spacing: -1px; }
        h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }

        /* --- CARDS E ELEMENTOS --- */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
        .label-dim { font-size: 0.65rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; }

        /* --- INPUTS --- */
        input, select { 
            width: 100%; padding: 18px; background: var(--surface-light); border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; font-size: 1rem; margin-bottom: 16px; 
        }
        input:focus { border-color: var(--accent); outline: none; }

        .btn { 
            width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; 
            border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.9rem;
        }

        /* --- DASHBOARD --- */
        .kcal-main { text-align: center; margin: 20px 0 40px; }
        .kcal-number { font-size: 4.5rem; font-weight: 800; line-height: 1; display: block; }
        
        .macro-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .m-card { background: var(--surface); padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
        .m-val { color: var(--accent); font-weight: 800; font-size: 1.1rem; display: block; }
        .m-label { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        /* --- PLANO DE DIETA (MASTIGADO) --- */
        .meal-card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 16px; border-left: 4px solid var(--accent); }
        .meal-header { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; }
        .meal-title { font-weight: 800; font-size: 1rem; text-transform: uppercase; }
        .meal-kcal { font-size: 0.8rem; font-weight: 700; color: var(--accent); }
        .meal-content { font-size: 0.9rem; line-height: 1.5; color: #ccc; margin-bottom: 12px; }
        
        .storage-box { 
            background: rgba(204, 255, 0, 0.05); border: 1px dashed var(--accent); 
            padding: 12px; border-radius: 10px; font-size: 0.75rem; 
        }
        .storage-tag { font-weight: 800; color: var(--accent); text-transform: uppercase; margin-right: 5px; }

        /* --- NAVIGATION --- */
        .nav { 
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); 
            width: 100%; max-width: 430px; height: 85px; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); border-top: 1px solid var(--border);
            display: none; grid-template-columns: repeat(3, 1fr); align-items: center;
        }
        .nav-item { text-align: center; color: var(--text-dim); cursor: pointer; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { width: 24px; height: 24px; margin: 0 auto 6px; display: block; background: currentColor; mask-size: contain; mask-repeat: no-repeat; mask-position: center; }

    </style>
</head>
<body>

<div class="app-shell">

    <!-- TELA 1: CADASTRO INICIAL -->
    <section id="page-onboarding" class="page active">
        <div class="logo">EVO</div>
        <p class="slogan">Torne-se viciado em melhorar a si mesmo.</p>
        <h1>Sua evolução começa aqui.</h1>
        
        <div class="input-box">
            <label class="label-dim">Seu Nome</label>
            <input type="text" id="user-name" placeholder="Ex: Marcus">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="input-box"><label class="label-dim">Peso (kg)</label><input type="number" id="weight" value="80"></div>
            <div class="input-box"><label class="label-dim">Altura (cm)</label><input type="number" id="height" value="175"></div>
        </div>

        <div class="input-box">
            <label class="label-dim">Objetivo Principal</label>
            <select id="goal">
                <option value="emagrecer">Emagrecimento Crítico</option>
                <option value="hipertrofia">Hipertrofia Máxima</option>
                <option value="manter">Performance / Manutenção</option>
            </select>
        </div>

        <button class="btn" onclick="initApp()">Gerar Plano de Evolução</button>
    </section>

    <!-- TELA 2: DASHBOARD -->
    <section id="page-home" class="page">
        <div class="header" style="margin-bottom: 40px;">
            <span class="label-dim" id="today-date">Hoje</span>
            <h2 id="welcome-msg">Olá, Marcus</h2>
        </div>

        <div class="kcal-main">
            <span class="label-dim">Meta Diária Restante</span>
            <span class="kcal-number" id="dash-kcal">2400</span>
            <span style="font-weight: 800; font-size: 0.8rem; color: var(--accent);">KCAL</span>
        </div>

        <div class="macro-row">
            <div class="m-card"><span class="m-label">Proteína</span><span class="m-val" id="m-p">160g</span></div>
            <div class="m-card"><span class="m-label">Carbos</span><span class="m-val" id="m-c">220g</span></div>
            <div class="m-card"><span class="m-label">Gordura</span><span class="m-val" id="m-g">60g</span></div>
        </div>
    </section>

    <!-- TELA 3: PLANO MASTIGADO (DIETA) -->
    <section id="page-diet" class="page">
        <h1>Seu Plano Mastigado</h1>
        <p class="label-dim" style="margin-bottom: 24px;">Baseado no Padrão Brasileiro TACO</p>

        <div id="diet-container">
            <!-- As refeições serão injetadas aqui via JS -->
        </div>
    </section>

    <!-- NAVEGAÇÃO -->
    <nav class="nav" id="main-nav">
        <div class="nav-item active" onclick="showPage('page-home', this)"><span>Início</span></div>
        <div class="nav-item" onclick="showPage('page-diet', this)"><span>Plano</span></div>
        <div class="nav-item" onclick="showPage('page-onboarding', this)"><span>Perfil</span></div>
    </nav>

</div>

<script>
    let userData = {};

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        window.scrollTo(0,0);
    }

    function initApp() {
        const name = document.getElementById('user-name').value || "Guerreiro";
        const weight = parseFloat(document.getElementById('weight').value);
        const goal = document.getElementById('goal').value;

        // Lógica de Nutrição Profissional
        let baseKcal = (weight * 22) * 1.3; // TMB básica simplificada
        if(goal === 'emagrecer') baseKcal -= 500;
        if(goal === 'hipertrofia') baseKcal += 400;

        userData = {
            name: name,
            kcal: Math.round(baseKcal),
            p: Math.round(weight * 2),
            g: Math.round(weight * 0.8),
            c: Math.round((baseKcal - (weight * 2 * 4) - (weight * 0.8 * 9)) / 4)
        };

        // Atualiza UI
        document.getElementById('welcome-msg').innerText = "Olá, " + name;
        document.getElementById('dash-kcal').innerText = userData.kcal;
        document.getElementById('m-p').innerText = userData.p + "g";
        document.getElementById('m-c').innerText = userData.c + "g";
        document.getElementById('m-g').innerText = userData.g + "g";

        generateDietPlan(goal);
        
        document.getElementById('main-nav').style.display = 'grid';
        showPage('page-home');
    }

    function generateDietPlan(goal) {
        const container = document.getElementById('diet-container');
        const meals = [
            {
                title: "Café da Manhã",
                kcal: "350 kcal",
                desc: "3 Ovos mexidos com 1 fatia de Pão Integral ou 50g de Mandioca cozida.",
                prep: "Não congelar ovos prontos. A mandioca pode ser congelada cozida por 3 meses."
            },
            {
                title: "Almoço (Padrão BR)",
                kcal: "650 kcal",
                desc: "150g de Arroz Branco, 100g de Feijão e 150g de Frango Grelhado. Salada à vontade.",
                prep: "Pode congelar o kit completo. O frango dura 4 dias na geladeira."
            },
            {
                title: "Lanche da Tarde",
                kcal: "250 kcal",
                desc: "1 Iogurte Desnatado com 30g de Aveia e 1 fruta (Banana ou Maçã).",
                prep: "Frutas picadas perdem nutrientes. Consumir na hora."
            },
            {
                title: "Jantar",
                kcal: "500 kcal",
                desc: "Omelete com Espinafre ou Carne Moída (Patinho) com Legumes ao vapor.",
                prep: "A carne moída aceita excelente congelamento. Legumes ficam moles se congelados após cozidos."
            }
        ];

        container.innerHTML = meals.map(m => `
            <div class="meal-card">
                <div class="meal-header">
                    <span class="meal-title">${m.title}</span>
                    <span class="meal-kcal">${m.kcal}</span>
                </div>
                <div class="meal-content">${m.desc}</div>
                <div class="storage-box">
                    <span class="storage-tag">Conservação:</span> ${m.prep}
                </div>
            </div>
        `).join('');
    }

    // Define data de hoje
    const d = new Date();
    const options = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById('today-date').innerText = d.toLocaleDateString('pt-BR', options);

</script>
</body>
</html>
