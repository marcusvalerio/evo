ENDOFFILE'
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fluxo"/>
<meta name="theme-color" content="#000000"/>
<title>Fluxo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;
  --s1:#0a0a0a;
  --s2:#111;
  --s3:#1a1a1a;
  --s4:#242424;
  --border:#1f1f1f;
  --border-hi:#2e2e2e;
  --text:#f0f0f0;
  --text-2:#808080;
  --text-3:#3a3a3a;
  --green:#30d158;
  --green-dim:rgba(48,209,88,.1);
  --green-glow:rgba(48,209,88,.06);
  --green-border:rgba(48,209,88,.18);
  --amber:#ff9f0a;
  --amber-dim:rgba(255,159,10,.08);
  --blue:#0a84ff;
  --red:#ff453a;
  --sans:'DM Sans',system-ui,-apple-system,sans-serif;
  --mono:'DM Mono',ui-monospace,monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --ease:cubic-bezier(.16,1,.3,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;-webkit-text-size-adjust:100%}
button,input,select{font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── SHELL ── */
#root{max-width:430px;margin:0 auto;min-height:100vh;position:relative}

/* ── ONBOARDING ── */
#onboarding{
  position:fixed;inset:0;z-index:999;
  background:#000;
  display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;
  overflow:hidden;
}
.ob-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 20%, rgba(48,209,88,.12) 0%, transparent 70%),
             radial-gradient(ellipse 60% 40% at 80% 80%, rgba(48,209,88,.06) 0%, transparent 60%),
             #000;
}
.ob-noise{
  position:absolute;inset:0;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px;
}
.ob-lines{
  position:absolute;inset:0;overflow:hidden;
}
.ob-lines::before{
  content:'';position:absolute;
  top:15%;left:50%;transform:translateX(-50%);
  width:1px;height:200px;
  background:linear-gradient(180deg,transparent,rgba(48,209,88,.3),transparent);
  animation:linePulse 3s ease-in-out infinite;
}
.ob-lines::after{
  content:'';position:absolute;
  top:18%;left:calc(50% - 60px);
  width:1px;height:140px;
  background:linear-gradient(180deg,transparent,rgba(48,209,88,.15),transparent);
  animation:linePulse 3s ease-in-out infinite .8s;
}
@keyframes linePulse{0%,100%{opacity:.4;transform:translateX(-50%) scaleY(.8)}50%{opacity:1;transform:translateX(-50%) scaleY(1)}}

/* figures in motion */
.ob-figures{
  position:absolute;top:0;left:0;right:0;height:62%;
  overflow:hidden;
}
.fig{
  position:absolute;bottom:0;
  width:3px;border-radius:2px;
  background:linear-gradient(180deg,transparent 0%,rgba(48,209,88,.6) 40%,rgba(48,209,88,.9) 100%);
  animation:figRun linear infinite;
  transform-origin:bottom center;
}
.fig::before{
  content:'';position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  width:10px;height:10px;border-radius:50%;
  background:rgba(48,209,88,.7);
  box-shadow:0 0 12px rgba(48,209,88,.5);
}
.fig::after{
  content:'';position:absolute;top:-28px;left:50%;transform:translateX(-50%);
  width:7px;height:7px;border-radius:50%;
  background:rgba(48,209,88,.5);
  box-shadow:0 0 8px rgba(48,209,88,.4);
}
@keyframes figRun{
  0%{transform:translateX(-20px) scaleY(.9)}
  25%{transform:translateX(0px) scaleY(1.05)}
  50%{transform:translateX(10px) scaleY(.95)}
  75%{transform:translateX(0px) scaleY(1.08)}
  100%{transform:translateX(-20px) scaleY(.9)}
}

.ob-content{
  position:relative;z-index:2;
  margin-top:auto;
  padding:0 32px calc(var(--safe-bottom) + 48px);
}
.ob-wordmark{
  font-size:64px;font-weight:700;letter-spacing:-3px;
  color:var(--text);line-height:1;margin-bottom:14px;
  animation:obTitleIn 1s var(--ease) .2s both;
}
.ob-wordmark span{color:var(--green)}
.ob-tagline{
  font-size:16px;font-weight:400;color:var(--text-2);
  line-height:1.5;margin-bottom:40px;letter-spacing:-.1px;
  animation:obTitleIn 1s var(--ease) .4s both;
}
@keyframes obTitleIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.ob-name-wrap{
  animation:obTitleIn 1s var(--ease) .6s both;
}
.ob-input-label{
  font-family:var(--mono);font-size:9px;letter-spacing:2.5px;
  color:var(--text-3);text-transform:uppercase;margin-bottom:10px;
}
.ob-input{
  width:100%;background:var(--s1);
  border:1px solid var(--border-hi);border-radius:14px;
  padding:16px 20px;color:var(--text);font-size:17px;font-weight:400;
  outline:none;transition:border-color .2s;letter-spacing:-.2px;
  margin-bottom:14px;
}
.ob-input:focus{border-color:rgba(48,209,88,.4)}
.ob-input::placeholder{color:var(--text-3)}
.ob-btn{
  width:100%;padding:17px;border-radius:14px;
  background:var(--green);border:none;
  color:#000;font-size:16px;font-weight:600;letter-spacing:-.2px;
  cursor:pointer;transition:all .18s var(--spring);
}
.ob-btn:active{transform:scale(.97);background:rgba(48,209,88,.88)}
.ob-skip{
  display:block;text-align:center;margin-top:16px;
  font-family:var(--mono);font-size:11px;color:var(--text-3);
  letter-spacing:1px;cursor:pointer;
}

/* ── SCROLL ── */
.scroll{
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-top:calc(var(--safe-top) + 16px);
  padding-bottom:calc(64px + var(--safe-bottom) + 24px);
  min-height:100vh;
}
.scroll::-webkit-scrollbar{display:none}

/* ── PAGE ENTER ── */
.page{animation:pgIn .26s var(--ease) both}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── STAGGER ── */
.sg>*{opacity:0;animation:sgIn .3s var(--ease) both}
.sg>*:nth-child(1){animation-delay:.04s}
.sg>*:nth-child(2){animation-delay:.09s}
.sg>*:nth-child(3){animation-delay:.14s}
.sg>*:nth-child(4){animation-delay:.19s}
.sg>*:nth-child(5){animation-delay:.24s}
.sg>*:nth-child(6){animation-delay:.29s}
@keyframes sgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── TAB BAR ── */
.tabbar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(0,0,0,.9);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;justify-content:space-around;align-items:center;
  padding:8px 0 calc(var(--safe-bottom) + 6px);
  z-index:100;
}
.ti{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:5px 4px;border:none;background:transparent;cursor:pointer;
  transition:transform .15s var(--spring);
}
.ti:active{transform:scale(.85)}
.ti svg{width:22px;height:22px;stroke-width:1.6;stroke:var(--text-3);transition:stroke .2s,transform .2s var(--spring)}
.ti.active svg{stroke:var(--green);transform:scale(1.1)}
.ti-dot{width:4px;height:4px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .2s;margin-top:1px}
.ti.active .ti-dot{opacity:1}

/* ── PAGE HEADERS ── */
.ph{padding:0 20px 24px}
.ph-label{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:5px}
.ph-title{font-size:32px;font-weight:600;letter-spacing:-.8px;line-height:1.05}
.ph-title em{color:var(--green);font-style:normal}

/* ── CARDS ── */
.card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:18px;overflow:hidden;margin-bottom:10px;
}
.card.done{background:rgba(48,209,88,.03);border-color:var(--green-border)}
.card-hdr{
  padding:14px 18px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card.done .card-hdr{border-bottom-color:rgba(48,209,88,.1)}
.card-ico{
  width:28px;height:28px;border-radius:9px;background:var(--s3);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-ico svg{width:13px;height:13px;stroke:var(--text-2);stroke-width:1.8}
.card.done .card-ico{background:rgba(48,209,88,.12)}
.card.done .card-ico svg{stroke:var(--green)}
.card-name{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:var(--text-2)}
.card.done .card-name{color:var(--green)}
.card-ct{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.card.done .card-ct{color:var(--green)}

/* ── ROWS ── */
.row{
  display:flex;align-items:center;gap:12px;
  padding:11px 18px;cursor:pointer;
  transition:background .1s;user-select:none;
}
.row:active{background:rgba(255,255,255,.015)}
.chkbox{
  width:22px;height:22px;flex-shrink:0;border-radius:7px;
  border:1.5px solid var(--s4);background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s var(--spring);
}
.chkbox.on{
  background:var(--green);border-color:var(--green);
  transform:scale(1.05);
  box-shadow:0 0 0 3px rgba(48,209,88,.1);
}
.chkbox.blue{border-color:rgba(10,132,255,.35)}
.chkbox svg{display:none}
.chkbox.on svg{display:block}
.rname{flex:1;font-size:13.5px;color:var(--text);transition:color .2s,opacity .2s}
.row.chk .rname{color:var(--text-3);text-decoration:line-through;text-decoration-color:var(--s4);opacity:.6}
.rname.cr{color:var(--blue);font-style:italic}
.rqty{font-family:var(--mono);font-size:10px;color:var(--text-3);flex-shrink:0}
.row.chk .rqty{opacity:.3}

/* ── RING ── */
.ring{position:relative;flex-shrink:0}
.ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--s3);stroke-width:2.5}
.ring-fill{fill:none;stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset .9s var(--ease),stroke .4s}
.ring-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:500}

/* ── STAT CARDS ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px 18px}
.sc.full{grid-column:1/-1}
.sc.hi{border-color:var(--green-border);background:var(--green-glow)}
.sc-label{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:9px}
.sc-val{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.sc-val.g{color:var(--green)}
.sc-val.a{color:var(--amber)}
.sc-val.sm{font-size:18px}
.sc-sub{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:5px}

/* ── PROG BAR ── */
.pb{height:2px;background:var(--s3);border-radius:1px;overflow:hidden;margin-top:12px}
.pb-fill{height:100%;border-radius:1px;transition:width 1.2s var(--ease)}

/* ── DAY PICKER ── */
.daypick{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 20px;margin-bottom:14px}
.db{
  padding:8px 2px;border-radius:12px;border:1px solid var(--border);
  background:transparent;cursor:pointer;text-align:center;
  transition:all .2s var(--spring);
}
.db:active{transform:scale(.88)}
.db.sel{border-color:var(--green-border);background:var(--green-dim)}
.db-name{font-family:var(--mono);font-size:7px;letter-spacing:.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:3px}
.db.sel .db-name{color:rgba(48,209,88,.6)}
.db-dot{width:3px;height:3px;border-radius:50%;background:var(--green);margin:0 auto 3px;box-shadow:0 0 4px rgba(48,209,88,.6)}
.db-p{font-family:var(--mono);font-size:7px;color:var(--text-3)}
.db-p.done{color:var(--green)}.db-p.part{color:var(--amber)}

/* ── DONE BANNER ── */
.done-banner{
  border-radius:18px;border:1px solid var(--green-border);
  background:rgba(48,209,88,.04);
  padding:28px 24px;text-align:center;margin-top:4px;
  animation:bannerIn .4s var(--spring) both;
}
@keyframes bannerIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.done-banner-title{font-size:16px;font-weight:600;color:var(--green);letter-spacing:-.2px;margin-bottom:4px}
.done-banner-sub{font-family:var(--mono);font-size:9px;color:rgba(48,209,88,.35);letter-spacing:2.5px}

/* ── CONFETTI ── */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:600;overflow:hidden}
.cp{position:absolute;width:5px;height:9px;border-radius:2px;opacity:0;animation:cpFall linear forwards}
@keyframes cpFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}85%{opacity:.7}100%{opacity:0;transform:translateY(100vh) rotate(700deg)}}

/* ── CHART ── */
.chart-box{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px;overflow:hidden}
.chart-box svg{width:100%;display:block}
.no-data{font-family:var(--mono);font-size:10px;color:var(--text-3);text-align:center;padding:28px 0}

/* ── WEIGHT LOG ── */
.wrow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
.wrow:last-child{border-bottom:none}
.wrow-date{font-family:var(--mono);font-size:10px;color:var(--text-2)}
.wrow-r{display:flex;align-items:center;gap:10px}
.wrow-val{font-family:var(--mono);font-size:13px;color:var(--text);font-variant-numeric:tabular-nums}
.wrow-diff{font-family:var(--mono);font-size:10px;font-variant-numeric:tabular-nums}
.wrow-del{background:none;border:none;color:var(--text-3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;transition:color .18s}
.wrow-del:active{color:var(--red)}

/* ── TREINO ── */
.treino-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:10px}
.treino-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.treino-tipo{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.treino-dur{font-family:var(--mono);font-size:10px;color:var(--text-3);margin-top:2px}
.treino-date-lbl{font-family:var(--mono);font-size:10px;color:var(--text-3);flex-shrink:0}
.treino-qual{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:10px;
  padding:3px 9px;border-radius:20px;
}
.treino-qual.bom{color:var(--green);background:var(--green-dim);border:1px solid var(--green-border)}
.treino-qual.ruim{color:var(--amber);background:var(--amber-dim);border:1px solid rgba(255,159,10,.2)}
.treino-notas{font-family:var(--mono);font-size:10px;color:var(--text-2);padding:10px 18px 12px;font-style:italic;border-top:1px solid var(--border)}

/* ── FORMS ── */
.form-box{background:var(--s1);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:10px}
.form-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;justify-content:space-between}
.form-body{padding:16px 18px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}
.flabel{font-family:var(--mono);font-size:8px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase}
.finput{
  background:var(--s2);border:1px solid var(--border);border-radius:11px;
  padding:10px 14px;color:var(--text);font-size:14px;
  outline:none;width:100%;transition:border-color .2s;
}
.finput:focus{border-color:rgba(48,209,88,.35)}
.finput::placeholder{color:var(--text-3)}
select.finput option{background:var(--s1)}
.fbtn{
  width:100%;padding:13px;border-radius:12px;
  background:var(--green-dim);border:1px solid var(--green-border);
  color:var(--green);font-family:var(--mono);font-size:11px;
  letter-spacing:1.5px;cursor:pointer;transition:all .18s var(--spring);
  margin-top:4px;
}
.fbtn:active{transform:scale(.98);background:rgba(48,209,88,.16)}

/* ── QUAL TOGGLE ── */
.qual-row{display:flex;gap:8px;margin-bottom:12px}
.qual-opt{
  flex:1;padding:11px 8px;border-radius:12px;
  border:1px solid var(--border);background:transparent;
  font-family:var(--mono);font-size:11px;letter-spacing:.5px;
  color:var(--text-2);cursor:pointer;text-align:center;
  transition:all .2s var(--spring);
}
.qual-opt:active{transform:scale(.94)}
.qual-opt.bom-sel{border-color:var(--green-border);background:var(--green-dim);color:var(--green)}
.qual-opt.ruim-sel{border-color:rgba(255,159,10,.25);background:var(--amber-dim);color:var(--amber)}

/* ── PROGRESSO WEEK GRID ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:0 20px;margin-bottom:8px}
.wgd{
  border-radius:11px;border:1px solid var(--border);padding:9px 3px;
  text-align:center;
}
.wgd.d{border-color:var(--green-border);background:var(--green-glow)}
.wgd.p{border-color:rgba(255,159,10,.2);background:var(--amber-dim)}
.wgd.t{border-color:rgba(10,132,255,.2);background:rgba(10,132,255,.05)}
.wgd.dt{border-color:var(--green-border);background:rgba(48,209,88,.08)}
.wgd-name{font-family:var(--mono);font-size:7px;letter-spacing:.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:4px}
.wgd.d .wgd-name,.wgd.dt .wgd-name{color:rgba(48,209,88,.45)}
.wgd-dots{display:flex;justify-content:center;gap:2px}
.dot{width:3px;height:3px;border-radius:50%}

/* ── SHOP ── */
.shop-sum{margin:0 20px 12px;padding:15px 18px;border-radius:16px;background:var(--s1);border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.shop-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:3px}
.shop-ct{font-family:var(--mono);font-size:13px;color:var(--text)}
.clr{font-family:var(--mono);font-size:10px;color:var(--text-2);background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;transition:all .18s}
.clr:active{background:var(--s3);transform:scale(.92)}
.stip{font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:2px}
.row.chk .stip{opacity:.3}
.sname{font-size:13.5px;color:var(--text)}
.row.chk .sname{color:var(--text-3);text-decoration:line-through;text-decoration-color:var(--s4);opacity:.6}
.sqty{font-family:var(--mono);font-size:10px;color:var(--text-3);flex-shrink:0;margin-left:6px}
.row.chk .sqty{opacity:.3}
.shop-info{flex:1}

// HELPERS

function getDayProg(dayName){
  const dm=MEALS[dayName];let t=0,d=0;
  MEAL_ORDER.forEach(m=>dm[m].forEach((_,i)=>{t++;if(S.checked[`${dayName}__${m}__${i}`])d++;}));
  return t===0?0:Math.round(d/t*100);
}

function ring(pct,color,lbl,size=48){
  const r=(size-8)/2,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  const label=lbl!==undefined?lbl:`${pct}%`;
  return `<div class="ring" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle class="ring-bg" cx="${size/2}" cy="${size/2}" r="${r}"/><circle class="ring-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg><div class="ring-txt" style="color:${color};font-size:${size<48?9:10}px">${label}</div></div>`;
}

function chk(on,blue){
  const cls='chkbox'+(on?' on':'')+(blue&&!on?' blue':'');
  return `<div class="${cls}"><svg width="10" height="8" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
}

function weightChart(weights){
  if(weights.length<2)return `<div class="no-data">Registre ao menos 2 pesagens</div>`;
  const sorted=[...weights].sort((a,b)=>a.date.localeCompare(b.date)).slice(-14);
  const vals=sorted.map(w=>w.val);
  const mn=Math.min(...vals)-.5,mx=Math.max(...vals)+.5;
  const W=300,H=88,pd=18;
  const x=i=>pd+(i/(sorted.length-1))*(W-pd*2);
  const y=v=>H-pd-((v-mn)/(mx-mn))*(H-pd*2);
  const pts=sorted.map((w,i)=>`${x(i)},${y(w.val)}`).join(' ');
  const area=`${pd},${H-pd} `+sorted.map((w,i)=>`${x(i)},${y(w.val)}`).join(' ')+` ${W-pd},${H-pd}`;
  const vl=sorted.map((w,i)=>`<text x="${x(i)}" y="${y(w.val)-5}" fill="rgba(128,128,128,.45)" font-size="7" text-anchor="middle" font-family="'DM Mono',monospace" font-variant-numeric="tabular-nums">${w.val}</text>`).join('');
  const dl=sorted.filter((_,i)=>i===0||i===sorted.length-1).map(w=>{const oi=sorted.indexOf(w);return `<text x="${x(oi)}" y="${H-1}" fill="rgba(58,58,58,.9)" font-size="7" text-anchor="middle" font-family="'DM Mono',monospace">${fmtDate(w.date)}</text>`;}).join('');
  return `<div class="chart-box"><svg viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#30d158" stop-opacity=".18"/><stop offset="100%" stop-color="#30d158" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="#30d158" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${sorted.map((w,i)=>`<circle cx="${x(i)}" cy="${y(w.val)}" r="2.5" fill="#30d158"/>`).join('')}
    ${vl}${dl}
  </svg></div>`;
}

function calcStreak(){
  let s=0;
  for(let i=0;i<90;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const idx=d.getDay()===0?6:d.getDay()-1;
    if(getDayProg(DAYS[idx])===100)s++;
    else if(i===0)continue;
    else break;
  }
  return s;
}

function weekInsight(){
  const done=DAYS.filter(d=>getDayProg(d)===100).length;
  const pct=Math.round(DAYS.reduce((a,d)=>a+getDayProg(d),0)/7);
  if(done>=6)return `<strong>${done} dias completos</strong> esta semana. Semana quase perfeita.`;
  if(done>=4)return `<strong>${done} dias completos</strong>. Consistência acima da média.`;
  if(pct>50)return `Média de <strong>${pct}%</strong> por dia esta semana.`;
  return `Cada refeição marcada conta. <strong>Comece de onde está.</strong>`;
}

function confetti(){
  const root=document.getElementById('confetti');
  root.innerHTML='';
  const colors=['#30d158','#0a84ff','#ff9f0a','#f0f0f0'];
  for(let i=0;i<36;i++){
    const el=document.createElement('div');
    el.className='cp';
    el.style.cssText=`left:${Math.random()*100}%;background:${colors[i%4]};animation-delay:${Math.random()*.5}s;animation-duration:${1.1+Math.random()*.7}s;transform:rotate(${Math.random()*360}deg)`;
    root.appendChild(el);
  }
  setTimeout(()=>{root.innerHTML=''},2000);
}

          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="treino-date-lbl">${fmtFull(t.date)}</div>
            ${t.qual?`<div class="treino-qual ${t.qual}">${t.qual==='bom'?'Treino bom':'Treino difícil'}</div>`:''}
          </div>
        </div>
        ${t.notas?`<div class="treino-notas">${t.notas}</div>`:''}
      </div>`).join('');

  // form treino — uncontrolled
  const tf={tipo:S._treinoTipo,dur:S._treinoDur,qual:S._treinoQual,notas:S._treinoNotas};
  const treinoForm=`<div class="form-box">
    <div class="form-hdr">Registrar treino <span style="font-family:var(--mono);font-size:10px;color:var(--text-3);font-weight:400">${fmtFull(S._treinoDate)}</span></div>
    <div class="form-body">
      <div class="field-row" style="margin-bottom:12px">
        <div class="field"><div class="flabel">Tipo</div><select id="tr-tipo" class="finput" style="font-size:13px">${TREINO_TIPOS.map(t=>`<option value="${t}"${tf.tipo===t?' selected':''}>${t}</option>`).join('')}</select></div>
        <div class="field"><div class="flabel">Duração (min)</div><input type="number" id="tr-dur" class="finput" placeholder="60" value="${tf.dur}" inputmode="numeric" onfocus="this.style.borderColor='rgba(48,209,88,.35)'" onblur="this.style.borderColor='var(--border)'"/></div>
      </div>
      <div style="margin-bottom:12px"><div style="font-family:var(--mono);font-size:8px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:8px">O treino foi</div>
        <div class="qual-row">
          <button id="q-bom" onclick="setTrQual('bom')" class="qual-opt${tf.qual==='bom'?' bom-sel':''}">Bom</button>
          <button id="q-ruim" onclick="setTrQual('ruim')" class="qual-opt${tf.qual==='ruim'?' ruim-sel':''}">Difícil</button>
        </div>
      </div>
      <div class="field" style="margin-bottom:12px"><div class="flabel">Observações</div><input type="text" id="tr-notas" class="finput" placeholder="Sensações, cargas, PR..." value="${tf.notas}" onfocus="this.style.borderColor='rgba(48,209,88,.35)'" onblur="this.style.borderColor='var(--border)'"/></div>
      <button onclick="addTreino()" class="fbtn">SALVAR TREINO</button>
    </div>
  </div>`;

  const wlog=sw.slice(0,6).map((w,i)=>{
    const nx=sw[i+1];const diff=nx?(w.val-nx.val).toFixed(1):null;
    const dc=diff===null?'':parseFloat(diff)<0?'#30d158':'#ff453a';
    return `<div class="wrow"><div class="wrow-date">${fmtFull(w.date)}</div><div class="wrow-r">${diff!==null?`<span class="wrow-diff" style="color:${dc}">${parseFloat(diff)<=0?'▼':'▲'}${Math.abs(diff)}kg</span>`:''}<span class="wrow-val">${w.val} kg</span><button class="wrow-del" onclick="deleteWeight('${w.date}')">×</button></div></div>`;
  }).join('');

  return `<div class="scroll page">
    <div class="ph"><div class="ph-label">Evolução</div><div class="ph-title">Progresso</div></div>

    <!-- hero peso -->
    <div style="margin:0 20px 12px;background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:22px 20px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Peso atual</div>
      <div style="font-family:var(--mono);font-size:46px;font-weight:300;color:var(--text);line-height:1;letter-spacing:-1.5px;font-variant-numeric:tabular-nums">${lw?lw.val:'—'}<span style="font-size:20px;color:var(--text-3)"> kg</span></div>
      ${wDiff!==null?`<div style="font-family:var(--mono);font-size:12px;color:${parseFloat(wDiff)<=0?'#30d158':'#ff453a'};margin-top:7px">${parseFloat(wDiff)<=0?'▼':'▲'} ${Math.abs(wDiff)} kg desde anterior</div>`:''}
      ${totalDiff!==null?`<div style="font-family:var(--mono);font-size:10px;color:var(--text-3);margin-top:3px">${parseFloat(totalDiff)<=0?'▼ '+Math.abs(totalDiff)+' kg no total':'▲ +'+totalDiff+' kg no total'}</div>`:''}
    </div>

    <!-- registro peso -->
    <div style="margin:0 20px 12px;background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:16px 18px">
      <div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:12px">Registrar hoje</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="weight-inp" inputmode="decimal" step="0.1" min="40" max="300" placeholder="103.5" value="${S._weightInput}" style="background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:10px 14px;color:var(--text);font-family:var(--mono);font-size:16px;outline:none;width:120px;font-variant-numeric:tabular-nums;-webkit-appearance:none;transition:border-color .2s" onfocus="this.style.borderColor='rgba(48,209,88,.35)'" onblur="this.style.borderColor='var(--border)'"/>
        <span style="font-family:var(--mono);font-size:12px;color:var(--text-3)">kg</span>
        <button onclick="addWeight()" style="padding:10px 20px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:11px;color:var(--green);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .18s var(--spring);letter-spacing:.5px" ontouchstart="this.style.transform='scale(.94)'" ontouchend="this.style.transform=''">Registrar</button>
      </div>
    </div>

    <div class="pad" style="margin-bottom:12px">${weightChart(S.weights)}</div>

    ${sw.length>0?`<div style="margin:0 20px 14px;background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:16px 18px"><div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Histórico</div>${wlog}</div>`:''}

    <!-- semana -->
    <div class="pad" style="margin-bottom:8px"><div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Semana — dieta e treino</div></div>
    <div class="week-grid">${weekGrid}</div>
    <div style="padding:0 20px;display:flex;gap:14px;margin-bottom:18px">
      ${[['#30d158','Dieta'],['#0a84ff','Treino'],['#ff9f0a','Parcial']].map(([c,l])=>`<div style="display:flex;align-items:center;gap:5px"><div style="width:7px;height:7px;border-radius:50%;background:${c}"></div><span style="font-family:var(--mono);font-size:9px;color:var(--text-3)">${l}</span></div>`).join('')}
    </div>

    <div class="pad" style="margin-bottom:10px">${treinoForm}</div>

    <div class="pad" style="margin-bottom:8px"><div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:12px">Treinos recentes</div>${treinoCards}</div>
    <div class="sp24"></div>
  </div>`;
}

function renderCompras(){
  const total=SHOPPING.reduce((a,c)=>a+c.items.length,0);
  const done=Object.values(S.shopChk).filter(Boolean).length;
  const pct=Math.round(done/total*100);
  const cards=SHOPPING.map((cat,ci)=>{
    const cd=cat.items.filter((_,i)=>S.shopChk[`${ci}_${i}`]).length,all=cd===cat.items.length;
    const rows=cat.items.map((f,ii)=>{const key=`${ci}_${ii}`,on=!!S.shopChk[key];return `<div class="row${on?' chk':''}" onclick="toggleShop('${key}')">${chk(on,false)}<div class="shop-info"><div class="shop-irow"><span class="sname">${f.n}</span><span class="sqty">${f.q}</span></div>${f.t?`<div class="stip">${f.t}</div>`:''}</div></div>`;}).join('');
    return `<div class="card${all?' done':''}"><div class="card-hdr"><div class="card-name" style="color:${all?'#30d158':cat.c}">${cat.cat}</div><div class="card-ct">${cd}/${cat.items.length}</div></div>${rows}</div>`;
  }).join('');
  const banner=done===total?`<div class="done-banner"><div class="done-banner-title">Compras completas</div><div class="done-banner-sub">SEMANA GARANTIDA</div></div>`:'';
  return `<div class="scroll page">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 20px">
      <div><div class="ph-label">Mercado</div><div style="font-size:28px;font-weight:600;letter-spacing:-.6px">Lista</div></div>
      ${ring(pct,'#30d158')}
    </div>
    <div class="shop-sum"><div><div class="shop-label">Semana completa</div><div class="shop-ct">${done} de ${total} itens</div></div><button class="clr" onclick="commit({shopChk:{}})">Limpar</button></div>
    <div class="pad sg">${cards}${banner}</div>
    <div class="sp24"></div>
  </div>`;
}

function renderReceitas(){
  const allCats=['Todos',...new Set(RECIPES.map(r=>r.cat)),'Congeláveis'];
  const f=S.recFilter;
  const filtered=RECIPES.filter(r=>f==='Todos'?true:f==='Congeláveis'?r.freeze:r.cat===f);
  return `<div class="scroll page">
    <div class="ph"><div class="ph-label">Cozinha</div><div class="ph-title">Receitas</div></div>
    <div class="rec-filters">${allCats.map(c=>`<button class="rf${f===c?' on':''}" onclick="commit({recFilter:'${c}'})">${c}</button>`).join('')}</div>
    <div class="rec-wrap sg">${filtered.map((r,i)=>{
      const key=`r_${i}`,exp=!!S.expanded[key];
      const steps=r.steps.map((s,si)=>`<div class="rec-step"><span class="step-n">${si+1}</span><span>${s}</span></div>`).join('');
      return `<div class="rec-card"><div class="rec-hdr"><span class="rec-name">${r.name}</span><div class="rec-badges">${r.freeze?`<span class="badge badge-frz">Congelar</span>`:''}<span class="badge badge-cat">${r.cat}</span></div></div>${exp?`<div class="rec-body"><div class="rec-sec">Ingredientes</div><div class="rec-ingr">${r.ingr}</div><div class="rec-sec">Preparo</div>${steps}${r.tip?`<div class="rec-tip">${r.tip}</div>`:''}</div>`:''}<button class="rec-exp" onclick="toggleRecipe('${key}')">${exp?'▲ Fechar':'▼ Ver receita'}</button></div>`;
    }).join('')}</div>
    <div class="sp24"></div>
  </div>`;
}

function renderFinanceiro(){
  const ps=S.purchases,now=new Date(),ws=new Date(now);
  ws.setDate(now.getDate()-now.getDay()+(now.getDay()===0?-6:1));ws.setHours(0,0,0,0);
  const twps=ps.filter(p=>new Date(p.date+'T00:00:00')>=ws);
  const wkT=twps.reduce((a,p)=>a+p.val,0),allT=ps.reduce((a,p)=>a+p.val,0);
  const mp=Math.min(100,Math.round(wkT/S.finMeta*100));
  const mc=mp>90?'#ff453a':mp>70?'#ff9f0a':'#30d158';
  const ct={};twps.forEach(p=>{ct[p.cat]=(ct[p.cat]||0)+p.val});
  const maxCt=Math.max(...Object.values(ct),1);
  const wmap={};ps.forEach(p=>{const d=new Date(p.date+'T00:00:00'),wsd=new Date(d);wsd.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1));const wk=`${wsd.getFullYear()}-${_p(wsd.getMonth()+1)}-${_p(wsd.getDate())}`;wmap[wk]=(wmap[wk]||0)+p.val});
  const swks=Object.entries(wmap).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  const sd=new Date(S.finDate+'T00:00:00'),y=sd.getFullYear(),m=sd.getMonth();
  const fd=new Date(y,m,1).getDay(),off=fd===0?6:fd-1,dim=new Date(y,m+1,0).getDate();
  const mns=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const pdates=new Set(ps.map(p=>p.date)),tod=todayStr();
  let cells='';for(let i=0;i<off;i++)cells+=`<div class="cd empty"></div>`;
  for(let d2=1;d2<=dim;d2++){const ds=`${y}-${_p(m+1)}-${_p(d2)}`;cells+=`<div class="cd${ds===tod?' today':''}${pdates.has(ds)?' hasp':''}${ds===S.finDate?' sel':''}" onclick="commit({finDate:'${ds}'})"><div class="cd-num">${d2}</div>${pdates.has(ds)?'<div class="cd-dot"></div>':''}</div>`;}
  const selPs=ps.filter(p=>p.date===S.finDate);
  const selT=selPs.reduce((a,p)=>a+p.val,0);
  const metaInput=S.finMetaEdit
    ?`<div style="display:flex;gap:8px;align-items:center;margin-top:7px"><input type="number" id="meta-inp" value="${S.finMeta}" inputmode="decimal" style="background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:100px;transition:border-color .2s" onfocus="this.style.borderColor='rgba(48,209,88,.35)'" onblur="this.style.borderColor='var(--border)'"/><button onclick="saveMeta()" style="padding:7px 12px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:8px;color:var(--green);font-family:var(--mono);font-size:10px;cursor:pointer">OK</button><button onclick="commit({finMetaEdit:false})" style="padding:7px 10px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-family:var(--mono);font-size:10px;cursor:pointer">×</button></div>`
    :`<div style="font-family:var(--mono);font-size:9px;color:var(--text-3);margin-top:5px;cursor:pointer" onclick="commit({finMetaEdit:true})">Meta: ${fmtBRL(S.finMeta)} · <span style="color:var(--green)">editar</span></div>`;
  return `<div class="scroll page">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 20px">
      <div><div class="ph-label">Gastos</div><div style="font-size:28px;font-weight:600;letter-spacing:-.6px">Financeiro</div></div>
      ${ring(mp,mc)}
    </div>
    <div class="stats sg" style="margin-bottom:16px">
      <div class="sc"><div class="sc-label">Esta semana</div><div class="sc-val sm" style="color:${mc}">${fmtBRL(wkT)}</div>${metaInput}</div>
      <div class="sc"><div class="sc-label">Total geral</div><div class="sc-val sm">${fmtBRL(allT)}</div><div class="sc-sub">${ps.length} lançamentos</div></div>
    </div>
    ${Object.keys(ct).length>0?`<div class="cat-bars"><div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Por categoria</div>${Object.entries(ct).sort((a,b)=>b[1]-a[1]).map(([c2,v])=>`<div class="cbar-row"><div class="cbar-name">${c2}</div><div class="cbar-track"><div class="cbar-fill" style="width:${Math.round(v/maxCt*100)}%"></div></div><div class="cbar-val">${fmtBRL(v)}</div></div>`).join('')}</div>`:''}
    <div class="cal-wrap"><div class="cal-top"><div class="cal-month">${mns[m]} ${y}</div><div class="cal-nav"><button onclick="prevMonth()">‹</button><button onclick="nextMonth()">›</button></div></div><div class="cal-grid">${['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div></div>
    <div class="form-box" style="margin:0 20px 14px">
      <div class="form-hdr">Lançar · ${S.finDate.split('-').reverse().join('/')} ${selT>0?`<span style="font-family:var(--mono);font-size:10px;font-weight:400;color:var(--text-2)">${fmtBRL(selT)}</span>`:''}</div>
      <div class="form-body">
        <div class="field-row" style="margin-bottom:10px">
          <div class="field" style="flex:2"><div class="flabel">Item</div><input type="text" id="fin-name" class="finput" placeholder="Peito de frango" value="${S._finName}" onfocus="this.style.borderColor='rgba(48,209,88,.35)'" onblur="this.style.borderColor='var(--border)'"/></div>
          <div class="field"><div class="flabel">R$</div><input type="number" id="fin-val" class="finput" inputmode="decimal" placeholder="0,00" min="0" step="0.01" value="${S._finVal}" onfocus="this.style.borderColor='rgba(48,209,88,.35)'" onblur="this.style.borderColor='var(--border)'"/></div>
        </div>
        <div class="field" style="margin-bottom:12px"><div class="flabel">Categoria</div><select id="fin-cat" class="finput">${FIN_CATS.map(c=>`<option value="${c}"${S._finCat===c?' selected':''}>${c}</option>`).join('')}</select></div>
        <button class="fbtn" onclick="addPurchase()">ADICIONAR</button>
      </div>
      <div style="padding:0 18px 14px">${selPs.length===0?`<div style="padding:14px;font-family:var(--mono);font-size:10px;color:var(--text-3);text-align:center">nenhum lançamento neste dia</div>`:selPs.map(p=>`<div class="pi"><div class="pi-l"><div class="pi-name">${p.name}</div><div class="pi-cat">${p.cat}</div></div><div class="pi-val">${fmtBRL(p.val)}</div><button class="pi-del" onclick="deletePurchase('${p.id}')">×</button></div>`).join('')}</div>
    </div>
    ${swks.length>0?`<div style="padding:0 20px;margin-bottom:14px"><div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Histórico semanal</div>${swks.map(([wk,v])=>{const d3=new Date(wk+'T00:00:00');return `<div class="hist-row"><div class="hist-wk">Semana ${_p(d3.getDate())}/${_p(d3.getMonth()+1)}</div><div style="display:flex;align-items:center;gap:10px"><div class="hist-val">${fmtBRL(v)}</div><div style="font-family:var(--mono);font-size:9px;color:${v>S.finMeta?'#ff453a':'#30d158'}">${v>S.finMeta?'acima':'ok'}</div></div></div>`;}).join('')}</div>`:''}
    <div class="sp24"></div>
  </div>`;
}

function renderMealPrep(){
  const total=PREP_ITEMS.length,done=PREP_ITEMS.filter(i=>(S.prepStock[i.n]||0)>0).length;
  const pct=Math.round(done/total*100);
  return `<div class="scroll page">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 20px">
      <div><div class="ph-label">Semana</div><div style="font-size:28px;font-weight:600;letter-spacing:-.6px">Meal Prep</div></div>
      ${ring(pct,'#30d158')}
    </div>
    <div class="pad sg">
      ${PREP_ITEMS.map(item=>{const qty=S.prepStock[item.n]||0,on=qty>0;return `<div class="prep-card"><div class="prep-hdr"><div class="prep-name">${item.n}</div><div class="prep-badge ${on?'on':'off'}">${on?'preparado':'pendente'}</div></div><div class="prep-row"><span>${item.u}</span><div class="prep-ctrl"><button class="prep-btn" onclick="adjPrep('${item.n}',-1)">−</button><div class="prep-num">${qty}</div><button class="prep-btn" onclick="adjPrep('${item.n}',1)">+</button></div></div></div>`;}).join('')}
      <button onclick="commit({prepStock:{}})" style="width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:12px;font-family:var(--mono);font-size:10px;color:var(--text-2);cursor:pointer;transition:all .18s;margin-top:4px" ontouchstart="this.style.background='var(--s2)'" ontouchend="this.style.background='transparent'">Zerar estoque</button>
    </div>
    <div class="sp24"></div>
  </div>`;
}

  return `<div class="scroll page">
    <div class="ph"><div class="ph-label">Fluxo</div><div class="ph-title">Mais</div></div>
    <div class="pad">
      ${[
        {l:'Receitas',s:'Modo de preparo completo',t:'receitas',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`},
        {l:'Financeiro',s:'Controle de gastos semanais',t:'financeiro',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`},
        {l:'Meal Prep',s:'Controle de estoque semanal',t:'mealprep',svg:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>`},
      ].map(it=>`<div class="mais-item" onclick="goTab('${it.t}')"><div class="mais-ico">${it.svg}</div><div><div class="mais-label">${it.l}</div><div class="mais-sub">${it.s}</div></div><div class="mais-arr"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="9 18 15 12 9 6"/></svg></div></div>`).join('')}

      <div style="background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:16px 18px;margin-bottom:10px;margin-top:4px">
        <div style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;margin-bottom:10px">Seu nome</div>
        <input type="text" id="name-inp" value="${S.userName}" placeholder="Como quer ser chamado" style="width:100%;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s" onfocus="this.style.borderColor='rgba(48,209,88,.35)'" onblur="saveName();this.style.borderColor='var(--border)'"/>
      </div>
    </div>
    <div class="sp24"></div>
  </div>`;
}

  renderTabBar();
}

// ACTIONS
// ══════════════════════════════
window.goTab=t=>{S.tab=t;render()};
window.commit=commit;

window.toggleFood=function(key){
  const prev=!!S.checked[key];
  const c={...S.checked};c[key]=!c[key];
  commit({checked:c});
  if(navigator.vibrate)navigator.vibrate(8);
  if(!prev){
    const day=DAYS[S.day];
    const total=MEAL_ORDER.reduce((a,m)=>a+MEALS[day][m].length,0);
    const done=Object.keys(c).filter(k=>k.startsWith(day+'__')&&c[k]).length;
    if(done===total)setTimeout(confetti,80);
  }
};
window.toggleShop=function(key){const c={...S.shopChk};c[key]=!c[key];commit({shopChk:c});if(navigator.vibrate)navigator.vibrate(8)};
window.toggleRecipe=function(key){const e={...S.expanded};e[key]=!e[key];commit({expanded:e})};
window.setFinDate=d=>commit({finDate:d});
window.prevMonth=function(){const d=new Date(S.finDate+'T00:00:00');d.setDate(1);d.setMonth(d.getMonth()-1);commit({finDate:`${d.getFullYear()}-${_p(d.getMonth()+1)}-01`})};
window.nextMonth=function(){const d=new Date(S.finDate+'T00:00:00');d.setDate(1);d.setMonth(d.getMonth()+1);commit({finDate:`${d.getFullYear()}-${_p(d.getMonth()+1)}-01`})};

window.addPurchase=function(){
  const name=document.getElementById('fin-name')?.value?.trim();
  const val=parseFloat(document.getElementById('fin-val')?.value);
  const cat=document.getElementById('fin-cat')?.value||FIN_CATS[0];
  if(!name||isNaN(val))return;
  const p={id:Date.now().toString(),date:S.finDate,name,cat,val};
  S._finName='';S._finVal='';S._finCat=cat;
  commit({purchases:[...S.purchases,p]});
};
window.deletePurchase=id=>commit({purchases:S.purchases.filter(p=>p.id!==id)});
window.saveMeta=function(){const el=document.getElementById('meta-inp');if(el&&!isNaN(parseFloat(el.value)))commit({finMeta:parseFloat(el.value),finMetaEdit:false})};

window.addWeight=function(){
  const el=document.getElementById('weight-inp');
  const v=parseFloat(el?.value);
  if(isNaN(v)||v<30||v>300)return;
  const today=todayStr();
  const filtered=S.weights.filter(w=>w.date!==today);
  S._weightInput='';
  commit({weights:[...filtered,{date:today,val:v}].sort((a,b)=>a.date.localeCompare(b.date))});
};
window.deleteWeight=date=>commit({weights:S.weights.filter(w=>w.date!==date)});

window.evalOpt=function(k,v){
  mut({[`_eval${k.charAt(0).toUpperCase()+k.slice(1)}`]:v});
  // just re-render the eval form buttons without full render
  const btn=document.querySelectorAll(`[onclick^="evalOpt('${k}'"]`);
  btn.forEach(b=>{
    const bv=b.getAttribute('onclick').match(/'([^']+)'\)$/)?.[1];
    b.style.borderColor=bv===v?'rgba(48,209,88,.25)':'var(--border)';
    b.style.background=bv===v?'var(--green-dim)':'transparent';
    b.style.color=bv===v?'var(--green)':'var(--text-2)';
  });
};
window.saveEval=function(){
  const nota=document.getElementById('eval-nota')?.value||'';
  const f={humor:S._evalHumor,energia:S._evalEnergia,fome:S._evalFome,nota};
  if(!f.humor&&!f.energia&&!f.fome&&!nota)return;
  mut({_evalHumor:'',_evalEnergia:'',_evalFome:'',_evalNota:''});
  commit({evals:{...S.evals,[S.evalDay]:{...f}}});
};

window.setTrQual=function(q){
  S._treinoQual=S._treinoQual===q?'':q;
  const bom=document.getElementById('q-bom');
  const ruim=document.getElementById('q-ruim');
  if(bom){bom.className='qual-opt'+(S._treinoQual==='bom'?' bom-sel':'')}
  if(ruim){ruim.className='qual-opt'+(S._treinoQual==='ruim'?' ruim-sel':'')}
};
window.addTreino=function(){
  const tipo=document.getElementById('tr-tipo')?.value||TREINO_TIPOS[0];
  const dur=document.getElementById('tr-dur')?.value||'';
  const notas=document.getElementById('tr-notas')?.value||'';
  const qual=S._treinoQual;
  const entry={id:Date.now().toString(),date:S._treinoDate,tipo,dur,qual,notas};
  S._treinoTipo=tipo;S._treinoDur='';S._treinoQual='';S._treinoNotas='';
  commit({treinoLog:[...S.treinoLog,entry]});
  if(navigator.vibrate)navigator.vibrate([8,40,8]);
};
window.deleteTreino=id=>commit({treinoLog:S.treinoLog.filter(t=>t.id!==id)});

window.adjPrep=function(name,delta){const s={...S.prepStock};s[name]=Math.max(0,(s[name]||0)+delta);commit({prepStock:s})};

window.saveName=function(){
  const el=document.getElementById('name-inp');
  if(el){const n=el.value.trim();if(n!==S.userName){S.userName=n;sv('fx2_name',n)}}
};

// ══════════════════════════════
// INIT
// ══════════════════════════════
initOnboarding();
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</body>
</html>
