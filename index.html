<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EVO - Premium Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #CCFF00;
            --accent-glow: rgba(204, 255, 0, 0.2);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg: #000000;
            --text-main: #FFFFFF;
            --text-dim: #71717A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 20, 20, 1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, var(--accent-glow) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-container { width: 100%; max-width: 430px; padding: 20px 20px 120px; }

        /* --- LIQUID GLASS COMPONENTS --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .page { display: none; animation: slideUp 0.5s ease forwards; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- UI ELEMENTS --- */
        .logo-title { font-weight: 800; font-size: 2.8rem; letter-spacing: -2px; color: var(--accent); text-align: center; margin-bottom: 10px; }
        .sub-logo { text-align: center; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }
        
        input, select, textarea {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 18px; color: #fff; font-size: 1rem; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        .btn-evo {
            background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 20px;
            font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 25px var(--accent-glow); transition: 0.3s;
        }
        .btn-evo:active { transform: scale(0.97); }

        .btn-secondary { background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); margin-top: 10px; }

        /* --- NAV BAR --- */
        .nav-bar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 380px; height: 75px;
            background: rgba(10,10,10,0.8); backdrop-filter: blur(30px);
            border-radius: 30px; border: 1px solid var(--glass-border);
            display: none; grid-template-columns: repeat(4, 1fr); align-items: center; z-index: 1000;
        }
        .nav-item { text-align: center; color: var(--text-dim); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        /* --- DASHBOARD WIDGETS --- */
        .kcal-hero { font-size: 4.5rem; font-weight: 800; text-align: center; display: block; margin: 10px 0; letter-spacing: -4px; }
        .macro-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .m-item { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 18px; text-align: center; }
        .m-item b { color: var(--accent); display: block; font-size: 1.1rem; }
        .m-item span { font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }

        .meal-card { border-left: 3px solid var(--accent); padding-left: 15px; margin-bottom: 25px; }
        .meal-tag { font-size: 0.65rem; background: var(--accent-glow); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-weight: 800; display: inline-block; margin-top: 10px; }

    </style>
</head>
<body>

<div class="app-container">

    <!-- TELA 1: AUTENTICAÇÃO (LOGIN/SIGNUP) -->
    <section id="page-auth" class="page active">
        <div class="logo-title">EVO</div>
        <p class="sub-logo">Torne-se viciado em melhorar a si mesmo.</p>
        
        <div class="glass-card">
            <h2 style="margin-bottom: 20px;">Bem-vindo</h2>
            <input type="email" id="auth-email" placeholder="E-mail">
            <input type="password" id="auth-password" placeholder="Senha">
            <button class="btn-evo" onclick="core.handleAuth('login')">Entrar</button>
            <button class="btn-evo btn-secondary" onclick="core.handleAuth('signup')">Criar Nova Conta</button>
        </div>
    </section>

    <!-- TELA 2: ONBOARDING (SÓ APARECE APÓS SIGNUP) -->
    <section id="page-onboarding" class="page">
        <h1>Sua Bio.</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Precisamos disso para calcular sua evolução.</p>
        <div class="glass-card">
            <input type="text" id="setup-name" placeholder="Como devemos te chamar?">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="number" id="setup-weight" placeholder="Peso (kg)">
                <input type="number" id="setup-height" placeholder="Altura (cm)">
            </div>
            <select id="setup-goal">
                <option value="emagrecer">Objetivo: Emagrecer</option>
                <option value="hipertrofia">Objetivo: Hipertrofia</option>
                <option value="manter">Objetivo: Performance</option>
            </select>
            <button class="btn-evo" onclick="core.completeOnboarding()">Concluir Perfil</button>
        </div>
    </section>

    <!-- TELA 3: DASHBOARD (HOME) -->
    <section id="page-home" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span id="streak-ui" style="color: var(--accent); font-weight: 800; font-size: 0.8rem;">🔥 0 DIAS</span>
            <span onclick="core.logout()" style="color: var(--text-dim); font-size: 0.7rem; cursor: pointer; font-weight: 800;">SAIR</span>
        </div>
        <h1 id="home-greet">Atleta</h1>
        
        <div class="glass-card">
            <span style="color: var(--text-dim); font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Meta Diária</span>
            <span class="kcal-hero" id="home-kcal">0</span>
            <div class="macro-row">
                <div class="m-item"><b id="home-p">0g</b><span>Prot</span></div>
                <div class="m-item"><b id="home-c">0g</b><span>Carb</span></div>
                <div class="m-item"><b id="home-g">0g</b><span>Gord</span></div>
            </div>
        </div>

        <div class="glass-card">
            <h2 style="font-size: 1rem; margin-bottom: 10px;">Dica do Dia</h2>
            <p id="daily-tip" style="font-size: 0.9rem; color: #ccc;">Carregando sabedoria...</p>
        </div>
    </section>

    <!-- TELA 4: DIETA -->
    <section id="page-diet" class="page">
        <h1>Plano<br>Mastigado.</h1>
        <div id="diet-list-container"></div>
    </section>

    <!-- TELA 5: TREINO -->
    <section id="page-workout" class="page">
        <h1>Registro de<br>Esforço.</h1>
        <div class="glass-card">
            <input type="text" id="work-type" placeholder="O que treinou hoje?">
            <input type="number" id="work-load" placeholder="Esforço Percebido (1-10)">
            <textarea id="work-journal" placeholder="Diário: Como foi a performance?"></textarea>
            <button class="btn-evo" onclick="core.saveWorkout()">Salvar Treino</button>
        </div>
    </section>

    <!-- TELA 6: ESTATÍSTICAS -->
    <section id="page-stats" class="page">
        <h1>Estatísticas.</h1>
        <div class="glass-card">
            <p id="stats-info" style="color: #ccc; line-height: 1.6;"></p>
        </div>
    </section>

    <!-- NAV BAR -->
    <nav class="nav-bar" id="main-nav">
        <div class="nav-item active" onclick="core.nav('page-home', this)">Home</div>
        <div class="nav-item" onclick="core.nav('page-diet', this)">Plano</div>
        <div class="nav-item" onclick="core.nav('page-workout', this)">Treino</div>
        <div class="nav-item" onclick="core.nav('page-stats', this)">Dados</div>
    </nav>

</div>

<script>
const core = {
    appState: {
        isAuthenticated: false,
        profile: null,
        diet: null,
        logs: [],
        streak: 0
    },

    init() {
        const saved = localStorage.getItem('evo_premium_state');
        if(saved) {
            this.appState = JSON.parse(saved);
            if(this.appState.isAuthenticated) {
                if(this.appState.profile) {
                    this.syncUI();
                    this.nav('page-home');
                    document.getElementById('main-nav').style.display = 'grid';
                } else {
                    this.nav('page-onboarding');
                }
            }
        }
    },

    save() {
        localStorage.setItem('evo_premium_state', JSON.stringify(this.appState));
        this.syncUI();
    },

    handleAuth(mode) {
        const email = document.getElementById('auth-email').value;
        if(!email) return alert("Insira um e-mail");

        this.appState.isAuthenticated = true;
        
        if(mode === 'signup') {
            this.nav('page-onboarding');
        } else {
            if(this.appState.profile) {
                this.nav('page-home');
                document.getElementById('main-nav').style.display = 'grid';
            } else {
                this.nav('page-onboarding');
            }
        }
        this.save();
    },

    completeOnboarding() {
        const name = document.getElementById('setup-name').value;
        const weight = parseFloat(document.getElementById('setup-weight').value);
        const height = parseFloat(document.getElementById('setup-height').value);
        const goal = document.getElementById('setup-goal').value;

        if(!name || !weight) return alert("Preencha os campos");

        // Cálculo dinâmico
        let kcal = (10 * weight) + (6.25 * height) - (5 * 25) + 5;
        if(goal === 'emagrecer') kcal -= 500; else kcal += 400;

        this.appState.profile = { name, weight, height, goal };
        this.appState.diet = {
            kcal: Math.round(kcal),
            p: Math.round(weight * 2),
            g: Math.round(weight * 0.8),
            c: Math.round((kcal - (weight*2*4) - (weight*0.8*9))/4)
        };

        this.nav('page-home');
        document.getElementById('main-nav').style.display = 'grid';
        this.save();
    },

    syncUI() {
        if(!this.appState.profile) return;
        document.getElementById('home-greet').innerText = `Olá, ${this.appState.profile.name}`;
        document.getElementById('home-kcal').innerText = this.appState.diet.kcal;
        document.getElementById('home-p').innerText = this.appState.diet.p + 'g';
        document.getElementById('home-c').innerText = this.appState.diet.c + 'g';
        document.getElementById('home-g').innerText = this.appState.diet.g + 'g';
        document.getElementById('streak-ui').innerText = `🔥 ${this.appState.streak} DIAS`;
        document.getElementById('daily-tip').innerText = "Consuma 35ml de água por cada kg de peso corporal para otimizar a queima de gordura.";
        
        this.renderDiet();
        this.renderStats();
    },

    renderDiet() {
        const w = this.appState.profile.weight;
        const container = document.getElementById('diet-list-container');
        const meals = [
            { t: "Café da Manhã", p: Math.round(w*0.5), c: Math.round(w*0.6), base: "Ovos Mexidos e Fruta" },
            { t: "Almoço BR", p: Math.round(w*0.7), c: Math.round(w*0.8), base: "Frango, Arroz e Feijão" },
            { t: "Jantar", p: Math.round(w*0.6), c: Math.round(w*0.4), base: "Carne Moída e Batata Doce" }
        ];

        container.innerHTML = meals.map(m => `
            <div class="glass-card meal-card">
                <div style="display:flex; justify-content:space-between">
                    <b>${m.t}</b>
                    <span style="color:var(--accent)">${m.p}g P | ${m.c}g C</span>
                </div>
                <p style="font-size:0.8rem; color:#ccc; margin-top:5px;">${m.base}</p>
                <span class="meal-tag">Padrão TACO: Pode Congelar</span>
            </div>
        `).join('');
    },

    saveWorkout() {
        const type = document.getElementById('work-type').value;
        const load = document.getElementById('work-load').value;
        if(!type) return;
        
        this.appState.logs.unshift({ type, load, date: new Date().toLocaleDateString() });
        this.appState.streak++;
        this.save();
        alert("Treino registrado!");
        this.nav('page-home');
    },

    renderStats() {
        const stats = document.getElementById('stats-info');
        stats.innerText = `Você já registrou ${this.appState.logs.length} treinos. Sua meta atual é ${this.appState.profile.goal}. Mantenha a constância!`;
    },

    logout() {
        this.appState.isAuthenticated = false;
        localStorage.removeItem('evo_premium_state');
        location.reload();
    },

    nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        window.scrollTo(0,0);
    }
};

core.init();
</script>
</body>
</html>
