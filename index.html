<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Alimentar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .glass-card { background: rgba(28, 28, 30, 0.8); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-24">

    <!-- Conteúdo da Home -->
    <main id="home" class="p-6">
        <h1 class="text-sm text-gray-500 font-bold uppercase tracking-widest">Plano Alimentar</h1>
        <h2 class="text-4xl font-bold mb-8">Home</h2>
        
        <!-- Exemplo de Card Premium -->
        <div class="glass-card rounded-3xl p-6 mb-4">
            <p class="text-gray-400 text-xs font-semibold uppercase">Streak</p>
            <p class="text-2xl font-bold mt-1">0 🔥</p>
        </div>
    </main>

    <!-- Menu Inferior Fixo -->
    <nav class="fixed bottom-0 w-full bg-[#050505]/90 backdrop-blur-lg border-t border-white/10 p-4 flex justify-around">
        <button onclick="showPage('home')" class="text-white font-semibold">Home</button>
        <button onclick="showPage('dieta')" class="text-gray-500">Dieta</button>
        <button onclick="showPage('compras')" class="text-gray-500">Compras</button>
    </nav>

    <script>
        function showPage(pageId) {
            // Lógica simples para alternar visibilidade
            document.querySelectorAll('main').forEach(el => el.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
        }
    </script>
</body>
</html>
